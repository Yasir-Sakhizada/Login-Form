<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Bebas+Neue&family=Black+Ops+One&family=Faustina:ital,wght@0,300..800;1,300..800&family=Iceberg&family=Lexend:wght@100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="flex items-center justify-center h-screen bg-gradient-to-r from-blue-500 to-purple-600"
  >
    <form
      id="loginForm"
      class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md"
      novalidate
    >
      <h2
        class="text-4xl font-aldrich font-semibold text-center text-gray-800 mb-6"
      >
        Login Form
      </h2>
      <p class="text-center text-gray-600 mb-4 text-sm">
        Please fill out all the fields carefully!
      </p>

      <!-- Email Field -->
      <div class="mb-4">
        <label for="email" class="block text-gray-700 font-medium mb-1"
          >Email</label
        >
        <input
          type="email"
          id="email"
          name="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:shadow-md focus:shadow-blue-500 focus:ring-2 focus:outline-none focus:border-none transition-all delay-75"
          placeholder="Enter your email"
          required
        />
        <p id="emailFeedback" class="text-sm text-red-500 mt-1 hidden">
          Please enter a valid email address.
        </p>
      </div>

      <!-- Username Field -->
      <div class="mb-4">
        <label for="username" class="block text-gray-700 font-medium mb-1"
          >Username</label
        >
        <input
          type="text"
          id="username"
          name="username"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:shadow-md focus:shadow-blue-500 focus:ring-2 focus:outline-none focus:border-none transition-all delay-75"
          placeholder="Enter your username"
          required
        />
        <p id="usernameFeedback" class="text-sm text-red-500 mt-1 hidden">
          Username cannot be Empty!
        </p>
      </div>

      <!-- Password Field -->
      <div class="mb-4 relative">
        <label for="password" class="block text-gray-700 font-medium mb-1"
          >Password</label
        >
        <input
          type="password"
          id="password"
          name="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:shadow-md focus:shadow-blue-500 focus:ring-2 focus:outline-none focus:border-none transition-all delay-75"
          placeholder="Enter your password"
          required
        />
        <p id="passwordFeedback" class="text-sm text-red-500 mt-1 hidden">
          Password must be at least 8 characters
        </p>
        <button
          type="button"
          id="togglePassword"
          class="absolute top-9 right-3 text-gray-500 text-xl hover:text-gray-700"
        >
          🙈
        </button>
      </div>

      <!-- Remember Me -->
      <div class="mb-4 flex items-center">
        <input
          type="checkbox"
          id="rememberMe"
          class="w-4 h-4 text-blue-600 border-gray-300"
        />
        <label for="rememberMe" class="ml-2 text-gray-700 select-none"
        >Remember me</label
        >
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="w-full bg-blue-500 text-white py-2 px-4 rounded-md hover:bg-blue-600 transition-all duration-75 hover:font-bold"
      >
        Log In
      </button>

      <!-- Forgot Password -->
      <p class="mt-4 text-center text-gray-600">
        <a href="#" class="text-blue-500 hover:underline"
          >Forgot your password?</a
        >
      </p>
    </form>

    <script src="script.js"></script>
  </body>
</html>
